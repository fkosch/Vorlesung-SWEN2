<svg width="520" height="215" viewBox="0 0 520 215" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <title>Aufbau einer HTML-Tabelle</title>
  <defs>
    <style>
	  * {
        stroke-width: 1px;
	  }
	  text {
	    font-size: 15px;
		font-family: monospace;
	  }
	 </style> 
  </defs>
  <g id="table">
    <desc>HTML-Markup einer einfachen Tabelle mit 3 Spalten, Kopfzeile und Inhaltsszellen</desc> 
    <rect x="10" y="10" height="200" width="498" fill="#ebf5d7" stroke="#8db243" />
    <text x="30" y="40">&lt;table&gt;</text>
	
    <text x="70" y="80">&lt;tr&gt;</text>  
    <rect x="110" y="60" height="30" width="100" fill="#ffebe6" stroke="#c32e04" />
	<text x="115" y="80">&lt;th&gt; &lt;/th&gt;</text>
    <rect x="210" y="60" height="30" width="100" fill="#ffebe6" stroke="#c32e04" />
	<text x="215" y="80">&lt;th&gt; &lt;/th&gt;</text>
    <rect x="310" y="60" height="30" width="100" fill="#ffebe6" stroke="#c32e04" />
	<text x="315" y="80">&lt;th&gt; &lt;/th&gt;</text>	
    <text x="415" y="80">&lt;/tr&gt;</text>	

    <text x="70" y="110">&lt;tr&gt;</text>  	
	<rect x="110" y="90" height="30" width="100" fill="#fffbf0" stroke="#dfac20" />
	<text x="115" y="110">&lt;td&gt; &lt;/td&gt;</text>
    <rect x="210" y="90" height="30" width="100" fill="#fffbf0" stroke="#dfac20" />
	<text x="215" y="110">&lt;td&gt; &lt;/td&gt;</text>
    <rect x="310" y="90" height="30" width="100" fill="#fffbf0" stroke="#dfac20" />
	<text x="315" y="110">&lt;td&gt; &lt;/td&gt;</text>	
    <text x="415" y="110">&lt;/tr&gt;</text>	

    <text x="70" y="140">&lt;tr&gt;</text>  
	<rect x="110" y="120" height="30" width="100" fill="#fffbf0" stroke="#dfac20" />
	<text x="115" y="140">&lt;td&gt; &lt;/td&gt;</text>
    <rect x="210" y="120" height="30" width="100" fill="#fffbf0" stroke="#dfac20" />
	<text x="215" y="140">&lt;td&gt; &lt;/td&gt;</text>
    <rect x="310" y="120" height="30" width="100" fill="#fffbf0" stroke="#dfac20" />
	<text x="315" y="140">&lt;td&gt; &lt;/td&gt;</text>	
    <text x="415" y="140">&lt;/tr&gt;</text>			
	
    <text x="30" y="180">&lt;/table&gt;</text>	
  </g>	
</svg>
